name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, without the leading v. Defaults to Cargo.toml.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      AUR_REPO: ssh://aur@aur.archlinux.org/emailctl-bin.git
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          cargo_version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="${VERSION_INPUT:-$cargo_version}"
            tag="v${version}"
          fi

          if [[ "${version}" != "${cargo_version}" ]]; then
            echo "Cargo.toml version (${cargo_version}) does not match release version (${version})." >&2
            exit 1
          fi

          if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            git tag "${tag}"
            git push origin "${tag}"
          fi

          {
            echo "version=${version}"
            echo "tag=${tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Test
        run: cargo test --locked

      - name: Build release archive
        id: archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          cargo build --release --locked

          archive_dir="emailctl-${VERSION}-${TARGET}"
          asset="emailctl-${VERSION}-${TARGET}.tar.gz"

          rm -rf dist
          install -Dm755 target/release/email "dist/${archive_dir}/email"
          install -Dm644 README.md "dist/${archive_dir}/README.md"
          tar -C dist -czf "dist/${asset}" "${archive_dir}"

          sha256="$(sha256sum "dist/${asset}" | awk '{print $1}')"

          {
            echo "asset=${asset}"
            echo "asset_path=dist/${asset}"
            echo "sha256=${sha256}"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          ASSET_PATH: ${{ steps.archive.outputs.asset_path }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${ASSET_PATH}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${TAG}" "${ASSET_PATH}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "emailctl ${TAG}" \
              --notes "Release emailctl ${VERSION}. The installed command remains \`email\`."
          fi

      - name: Configure AUR SSH
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${AUR_SSH_PRIVATE_KEY}" ]]; then
            echo "AUR_SSH_PRIVATE_KEY secret is not set." >&2
            exit 1
          fi

          install -d -m 700 ~/.ssh
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Update AUR package
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ASSET_SHA256: ${{ steps.archive.outputs.sha256 }}
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          if ! git clone "${AUR_REPO}" "${workdir}/aur" 2>/dev/null; then
            mkdir -p "${workdir}/aur"
            git -C "${workdir}/aur" init
            git -C "${workdir}/aur" checkout -b master
            git -C "${workdir}/aur" remote add origin "${AUR_REPO}"
          fi

          cd "${workdir}/aur"

          cat > LICENSE-MIT <<'EOF'
          MIT License

          Copyright (c) emailctl contributors

          Permission is hereby granted, free of charge, to any person obtaining a copy
          of this software and associated documentation files (the "Software"), to deal
          in the Software without restriction, including without limitation the rights
          to use, copy, modify, merge, publish, distribute, sublicense, and/or sell
          copies of the Software, and to permit persons to whom the Software is
          furnished to do so, subject to the following conditions:

          The above copyright notice and this permission notice shall be included in all
          copies or substantial portions of the Software.

          THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR
          IMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,
          FITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE
          AUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER
          LIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,
          OUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE
          SOFTWARE.
          EOF

          mit_sha256="$(sha256sum LICENSE-MIT | awk '{print $1}')"

          cat > PKGBUILD <<EOF
          # Maintainer: LIghtJUNction <lightjunction@users.noreply.github.com>

          pkgname=emailctl-bin
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc='Small scriptable terminal email client; installs the email command'
          arch=('x86_64')
          url='https://github.com/LIghtJUNction/emailctl'
          license=('MIT' 'Apache-2.0')
          depends=('glibc' 'libgcc' 'openssl')
          provides=("emailctl=\${pkgver}")
          conflicts=('emailctl')
          source=('LICENSE-MIT')
          source_x86_64=("\${pkgname}-\${pkgver}-\${CARCH}.tar.gz::\${url}/releases/download/v\${pkgver}/emailctl-\${pkgver}-\${CARCH}-unknown-linux-gnu.tar.gz")
          sha256sums=('${mit_sha256}')
          sha256sums_x86_64=('${ASSET_SHA256}')

          package() {
            install -Dm755 "emailctl-\${pkgver}-\${CARCH}-unknown-linux-gnu/email" "\${pkgdir}/usr/bin/email"
            install -Dm644 "emailctl-\${pkgver}-\${CARCH}-unknown-linux-gnu/README.md" "\${pkgdir}/usr/share/doc/\${pkgname}/README.md"
            install -Dm644 LICENSE-MIT "\${pkgdir}/usr/share/licenses/\${pkgname}/LICENSE-MIT"
          }
          EOF

          cat > .SRCINFO <<EOF
          pkgbase = emailctl-bin
          	pkgdesc = Small scriptable terminal email client; installs the email command
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/LIghtJUNction/emailctl
          	arch = x86_64
          	license = MIT
          	license = Apache-2.0
          	depends = glibc
          	depends = libgcc
          	depends = openssl
          	provides = emailctl=${VERSION}
          	conflicts = emailctl
          	source = LICENSE-MIT
          	sha256sums = ${mit_sha256}
          	source_x86_64 = emailctl-bin-${VERSION}-x86_64.tar.gz::https://github.com/LIghtJUNction/emailctl/releases/download/v${VERSION}/emailctl-${VERSION}-x86_64-unknown-linux-gnu.tar.gz
          	sha256sums_x86_64 = ${ASSET_SHA256}

          pkgname = emailctl-bin
          EOF

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add PKGBUILD .SRCINFO LICENSE-MIT

          if git diff --cached --quiet; then
            echo "AUR package is already up to date."
          else
            git commit -m "Update emailctl-bin to ${VERSION}"
            git push origin HEAD:master
          fi
